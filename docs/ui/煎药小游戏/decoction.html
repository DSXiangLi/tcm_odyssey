<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>煎药 · 诊所小游戏</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;900&family=VT323&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<template id="__bundler_thumbnail" data-bg-color="#1a0f08">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- paper scroll -->
    <rect x="120" y="120" width="960" height="560" fill="#e8c991" stroke="#8a5a2a" stroke-width="8"/>
    <rect x="100" y="100" width="1000" height="40" fill="#6b3e1f"/>
    <rect x="100" y="660" width="1000" height="40" fill="#6b3e1f"/>
    <!-- seal -->
    <rect x="200" y="200" width="120" height="120" fill="#8a1f1a" stroke="#b8322c" stroke-width="10" transform="rotate(-4 260 260)"/>
    <text x="260" y="280" font-family="serif" font-weight="900" font-size="72" fill="#f4dba8" text-anchor="middle" transform="rotate(-4 260 260)">杏</text>
    <!-- stove -->
    <rect x="380" y="420" width="280" height="180" fill="#7a3e22" stroke="#2a1408" stroke-width="6"/>
    <!-- fire -->
    <ellipse cx="520" cy="540" rx="60" ry="40" fill="#ff7a1a"/>
    <ellipse cx="520" cy="560" rx="40" ry="24" fill="#ffd24a"/>
    <!-- pot -->
    <ellipse cx="520" cy="400" rx="130" ry="30" fill="#3a1a0a" stroke="#2a1408" stroke-width="5"/>
    <path d="M 400 400 Q 400 470 520 480 Q 640 470 640 400 Z" fill="#5a2e18" stroke="#2a1408" stroke-width="5"/>
    <!-- steam -->
    <circle cx="500" cy="340" r="20" fill="#e8dcc4" opacity=".8"/>
    <circle cx="540" cy="310" r="24" fill="#e8dcc4" opacity=".6"/>
    <circle cx="520" cy="270" r="28" fill="#e8dcc4" opacity=".4"/>
    <!-- herb tags -->
    <rect x="760" y="220" width="80" height="90" fill="#c89550" stroke="#3f2412" stroke-width="5"/>
    <rect x="870" y="220" width="80" height="90" fill="#c89550" stroke="#3f2412" stroke-width="5"/>
    <rect x="980" y="220" width="80" height="90" fill="#c89550" stroke="#3f2412" stroke-width="5"/>
    <!-- vials -->
    <rect x="220" y="570" width="30" height="60" fill="#6a9c7e" stroke="#2a1408" stroke-width="4"/>
    <rect x="270" y="570" width="30" height="60" fill="#6a9c7e" stroke="#2a1408" stroke-width="4"/>
  </svg>
</template>
<style>
  :root{
    --ink:#2a1810;
    --ink-soft:#3a2418;
    --paper:#e8c991;
    --paper-bright:#f4dba8;
    --paper-deep:#c89550;
    --cinnabar:#b8322c;
    --cinnabar-deep:#8a1f1a;
    --jade:#6a8c78;
    --ember:#ff7a1a;
    --ember-core:#ffd24a;
    --wood:#6b3e1f;
    --wood-dark:#3f2412;
    --wood-light:#a26a3a;
    --brick:#8a4a2a;
    --brick-dark:#5a2e18;
    --brick-light:#b8633a;
    --smoke:#e8dcc4;
  }
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a0f08;font-family:"ZCOOL XiaoWei","Noto Serif SC",serif;}
  *{box-sizing:border-box;}

  /* Backdrop of the clinic (blurred/darkened behind modal) */
  .backdrop{
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 50% 40%, #4a2818 0%, #1a0f08 70%),
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(0,0,0,.15) 38px 40px);
    overflow:hidden;
  }
  .backdrop::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,180,80,.15) 0, transparent 25%),
      radial-gradient(circle at 80% 70%, rgba(255,180,80,.12) 0, transparent 28%);
    animation: flicker 4s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:.85}
    45%{opacity:1}
    60%{opacity:.75}
  }
  /* Fake blurred clinic shapes */
  .clinic-hint{
    position:absolute;inset:0;opacity:.35;filter:blur(2px);
  }

  .stage{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }

  /* ============== Scroll modal frame ================= */
  .scroll-modal{
    position:relative;
    width:1200px;height:760px;
    image-rendering:pixelated;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,.7));
  }

  /* End caps (roller rods) */
  .roller{
    position:absolute;left:-18px;right:-18px;height:38px;
    background:
      linear-gradient(180deg, #7a4a22 0%, #5a3418 50%, #3a2010 100%);
    border-top: 3px solid #a26a3a;
    border-bottom: 3px solid #2a1408;
    box-shadow: inset 0 2px 0 #c08a4a, inset 0 -2px 0 #1a0c04;
  }
  .roller.top{top:-10px;border-radius:4px 4px 0 0;}
  .roller.bottom{bottom:-10px;border-radius:0 0 4px 4px;}
  .roller-cap{
    position:absolute;top:50%;transform:translateY(-50%);
    width:22px;height:54px;
    background: linear-gradient(180deg, #c89550 0%, #8a5a2a 50%, #5a3418 100%);
    border:3px solid #2a1408;
    box-shadow: inset 0 2px 0 rgba(255,220,140,.5);
  }
  .roller-cap.left{left:-30px;}
  .roller-cap.right{right:-30px;}

  /* Paper */
  .paper{
    position:absolute;inset:28px 0;
    background:
      radial-gradient(ellipse at 30% 20%, #f4dba8 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, #e8c991 0%, transparent 50%),
      linear-gradient(180deg, #e8c991 0%, #d9b47a 100%);
    box-shadow:
      inset 0 0 0 3px #8a5a2a,
      inset 0 0 0 6px #e8c991,
      inset 0 0 0 8px #8a5a2a,
      inset 0 20px 60px rgba(138,74,42,.25),
      inset 0 -20px 60px rgba(138,74,42,.25);
  }
  /* Paper texture dots */
  .paper::before{
    content:"";position:absolute;inset:10px;
    background-image:
      radial-gradient(circle at 13% 27%, rgba(90,46,24,.08) 1px, transparent 2px),
      radial-gradient(circle at 67% 43%, rgba(90,46,24,.06) 1px, transparent 2px),
      radial-gradient(circle at 33% 73%, rgba(90,46,24,.07) 1px, transparent 2px),
      radial-gradient(circle at 87% 87%, rgba(90,46,24,.05) 1px, transparent 2px),
      radial-gradient(circle at 53% 13%, rgba(90,46,24,.08) 1px, transparent 2px);
    background-size: 180px 180px, 220px 220px, 260px 260px, 200px 200px, 240px 240px;
    pointer-events:none;
  }

  /* Red seal stamps on the corners */
  .seal{
    position:absolute;width:70px;height:70px;
    background: var(--cinnabar-deep);
    border:3px solid var(--cinnabar);
    color:#f4dba8;
    font-family:"Noto Serif SC",serif;font-weight:900;
    display:grid;place-content:center;text-align:center;
    line-height:1;font-size:22px;letter-spacing:2px;
    box-shadow: 0 0 0 3px #e8c991, 2px 2px 0 0 rgba(0,0,0,.4);
    transform: rotate(-4deg);
    image-rendering:pixelated;
  }
  .seal.tl{top:40px;left:18px;}
  .seal.br{bottom:40px;right:18px;transform:rotate(3deg);}
  .seal .s1,.seal .s2{display:block;}
  .seal.small{width:52px;height:52px;font-size:16px;}

  /* Title bar */
  .title-bar{
    position:absolute;top:44px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:22px;z-index:5;
  }
  .title-bar .ch{
    font-family:"Noto Serif SC",serif;font-weight:900;
    color:var(--ink);font-size:34px;letter-spacing:12px;
    text-shadow: 2px 2px 0 rgba(184,50,44,.2);
  }
  .title-bar .sub{
    font-family:"ZCOOL XiaoWei",serif;
    color:var(--wood-dark);font-size:14px;letter-spacing:4px;
    writing-mode:vertical-rl;
    border-left:1px solid var(--wood-dark);
    border-right:1px solid var(--wood-dark);
    padding:4px 3px;
  }
  .title-bar .deco{
    width:60px;height:2px;background:var(--wood-dark);position:relative;
  }
  .title-bar .deco::before,.title-bar .deco::after{
    content:"";position:absolute;top:-3px;width:8px;height:8px;background:var(--cinnabar);
    transform:rotate(45deg);
  }
  .title-bar .deco::before{left:0}
  .title-bar .deco::after{right:0}

  /* Close button */
  .close-btn{
    position:absolute;top:50px;right:60px;z-index:10;
    width:44px;height:44px;
    background:var(--cinnabar-deep);border:3px solid var(--ink);
    color:#f4dba8;font-family:"Noto Serif SC",serif;font-size:22px;font-weight:900;
    cursor:pointer;
    box-shadow: 2px 2px 0 rgba(0,0,0,.4), inset 1px 1px 0 rgba(255,255,255,.2);
  }
  .close-btn:hover{background:var(--cinnabar);}

  /* Main 3-region layout */
  .content{
    position:absolute;top:110px;left:40px;right:40px;bottom:44px;
    display:grid;
    grid-template-columns: 1.15fr 1fr;
    grid-template-rows: 2.2fr 1fr;
    gap:18px;
  }
  .region{
    position:relative;
    background:
      linear-gradient(180deg, rgba(244,219,168,.5), rgba(200,149,80,.3));
    border:3px solid var(--wood-dark);
    box-shadow: inset 0 0 0 2px var(--paper-bright), inset 0 0 0 4px var(--wood-dark);
  }
  .region-stove{grid-row:1/2;grid-column:1/2;}
  .region-bag{grid-row:1/3;grid-column:2/3;}
  .region-vials{grid-row:2/3;grid-column:1/2;}

  .region-label{
    position:absolute;top:-14px;left:16px;z-index:6;
    background:var(--ink);color:var(--paper-bright);
    font-family:"Noto Serif SC",serif;font-weight:900;
    padding:2px 14px;letter-spacing:4px;font-size:14px;
    border:2px solid var(--wood-light);
    box-shadow: 2px 2px 0 rgba(0,0,0,.3);
  }

  /* ===================== PIXEL STOVE ===================== */
  .stove-area{
    position:absolute;inset:0;
    overflow:hidden;
  }
  /* the stove uses CSS grid of "pixels" */
  .pixel-canvas{
    --px: 4px;
    position:absolute;left:50%;bottom:60px;transform:translateX(-50%);
    width: calc(var(--px) * 72);
    height: calc(var(--px) * 80);
    image-rendering:pixelated;
  }
  .px{position:absolute;width:var(--px);height:var(--px);}

  /* Stove body (brick) pattern generated with repeating backgrounds */
  .stove-body{
    position:absolute;left:calc(var(--px)*6);bottom:0;
    width:calc(var(--px)*60);height:calc(var(--px)*34);
    background:
      /* mortar grid */
      linear-gradient(var(--brick-dark), var(--brick-dark)) 0 0 / 100% 2px no-repeat,
      linear-gradient(var(--brick-dark), var(--brick-dark)) 0 calc(var(--px)*6) / 100% 2px no-repeat,
      linear-gradient(var(--brick-dark), var(--brick-dark)) 0 calc(var(--px)*12) / 100% 2px no-repeat,
      linear-gradient(var(--brick-dark), var(--brick-dark)) 0 calc(var(--px)*18) / 100% 2px no-repeat,
      linear-gradient(var(--brick-dark), var(--brick-dark)) 0 calc(var(--px)*24) / 100% 2px no-repeat,
      linear-gradient(var(--brick-dark), var(--brick-dark)) 0 calc(var(--px)*30) / 100% 2px no-repeat,
      /* base brick color */
      linear-gradient(180deg, #a25838 0%, #7a3e22 50%, #5a2e18 100%);
    border:3px solid var(--ink);
    box-shadow:
      inset 0 3px 0 rgba(255,200,150,.3),
      inset 0 -3px 0 rgba(0,0,0,.4);
  }
  /* brick vertical joints — alternate rows */
  .stove-body::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark));
    background-repeat:no-repeat;
    background-size: 2px calc(var(--px)*6);
    background-position:
      calc(var(--px)*15) calc(var(--px)*0),
      calc(var(--px)*35) calc(var(--px)*0),
      calc(var(--px)*25) calc(var(--px)*6),
      calc(var(--px)*45) calc(var(--px)*6),
      calc(var(--px)*15) calc(var(--px)*12),
      calc(var(--px)*35) calc(var(--px)*12);
  }
  .stove-body::after{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark)),
      linear-gradient(var(--brick-dark), var(--brick-dark));
    background-repeat:no-repeat;
    background-size: 2px calc(var(--px)*6);
    background-position:
      calc(var(--px)*25) calc(var(--px)*18),
      calc(var(--px)*45) calc(var(--px)*18),
      calc(var(--px)*15) calc(var(--px)*24),
      calc(var(--px)*35) calc(var(--px)*24);
  }
  /* stove top ledge */
  .stove-top{
    position:absolute;left:calc(var(--px)*2);bottom:calc(var(--px)*34);
    width:calc(var(--px)*68);height:calc(var(--px)*4);
    background:linear-gradient(180deg,#4a2818 0%, #2a1408 100%);
    border:3px solid var(--ink);
    box-shadow: inset 0 2px 0 rgba(200,120,60,.3);
  }

  /* Fire opening */
  .fire-hole{
    position:absolute;left:calc(var(--px)*24);bottom:calc(var(--px)*6);
    width:calc(var(--px)*24);height:calc(var(--px)*16);
    background:radial-gradient(ellipse at 50% 100%, #ffd24a 0%, #ff7a1a 30%, #b8322c 60%, #2a0a04 100%);
    border:3px solid var(--ink);
    border-radius: 30% 30% 10% 10%;
    overflow:hidden;
  }
  /* animated flames */
  .flame{
    position:absolute;bottom:-4px;width:10px;height:20px;
    background:
      radial-gradient(ellipse at 50% 100%, #fff1a8 0%, #ffd24a 30%, #ff7a1a 55%, #b8322c 90%);
    border-radius:50% 50% 20% 20%;
    animation: flameDance 0.6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 4px #ff8a22);
  }
  .flame.f1{left:16%;animation-delay:.0s;height:26px;width:12px;}
  .flame.f2{left:38%;animation-delay:.15s;height:32px;width:14px;}
  .flame.f3{left:58%;animation-delay:.3s;height:28px;width:12px;}
  .flame.f4{left:78%;animation-delay:.05s;height:22px;width:10px;}
  @keyframes flameDance{
    0%{transform:translateY(0) scaleY(1) scaleX(1);}
    100%{transform:translateY(-3px) scaleY(1.15) scaleX(.85);}
  }
  /* ember sparks */
  .ember-spark{
    position:absolute;width:3px;height:3px;background:#ffd24a;
    border-radius:50%;
    animation: emberRise 2.2s linear infinite;
    box-shadow:0 0 4px #ffae2a;
  }
  @keyframes emberRise{
    0%{transform:translateY(0);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-180px) translateX(var(--drift,20px));opacity:0;}
  }

  /* ======= Clay pot on top of stove ======= */
  .pot-wrap{
    position:absolute;left:calc(var(--px)*14);bottom:calc(var(--px)*36);
    width:calc(var(--px)*44);height:calc(var(--px)*28);
    z-index:3;
  }
  .pot-body{
    position:absolute;left:calc(var(--px)*4);bottom:0;
    width:calc(var(--px)*36);height:calc(var(--px)*22);
    background:
      radial-gradient(ellipse at 30% 30%, #6a3a22 0%, transparent 40%),
      linear-gradient(180deg, #5a2e18 0%, #3a1a0a 55%, #7a4422 75%, #3a1a0a 100%);
    border:3px solid var(--ink);
    border-radius: 20% 20% 40% 40% / 15% 15% 35% 35%;
    box-shadow:
      inset 4px 4px 0 rgba(180,90,40,.3),
      inset -4px -4px 0 rgba(0,0,0,.5);
  }
  /* pot rim */
  .pot-rim{
    position:absolute;left:0;bottom:calc(var(--px)*18);
    width:calc(var(--px)*44);height:calc(var(--px)*8);
    background:linear-gradient(180deg, #7a4422 0%, #3a1a0a 50%, #5a2e18 100%);
    border:3px solid var(--ink);
    border-radius: 50%;
    box-shadow: inset 0 2px 0 rgba(200,120,60,.4);
  }
  /* liquid surface */
  .pot-liquid{
    position:absolute;left:calc(var(--px)*3);bottom:calc(var(--px)*19);
    width:calc(var(--px)*38);height:calc(var(--px)*5);
    background:
      radial-gradient(ellipse at 50% 50%, #c89550 0%, #8a5028 50%, #3a1a0a 100%);
    border:2px solid var(--ink);
    border-radius: 50%;
    overflow:hidden;
  }
  .pot-liquid::before{
    content:"";position:absolute;inset:0;
    background: repeating-linear-gradient(90deg, transparent 0 8px, rgba(255,210,130,.3) 8px 10px);
    animation: liquidRipple 3s linear infinite;
  }
  @keyframes liquidRipple{
    0%{transform:translateX(0);}
    100%{transform:translateX(-10px);}
  }
  /* pot handles */
  .pot-handle{
    position:absolute;bottom:calc(var(--px)*14);width:calc(var(--px)*3);height:calc(var(--px)*4);
    background:#3a1a0a;border:2px solid var(--ink);
  }
  .pot-handle.l{left:calc(var(--px)*1);}
  .pot-handle.r{right:calc(var(--px)*1);}

  /* ====== Ladle (锅铲) — auto-stirring ====== */
  .ladle{
    position:absolute;left:calc(var(--px)*18);bottom:calc(var(--px)*50);
    width:calc(var(--px)*4);height:calc(var(--px)*22);
    transform-origin: 50% 80%;
    animation: stir 2.4s ease-in-out infinite;
    z-index:4;
  }
  .ladle-stick{
    position:absolute;left:calc(var(--px)*1);top:0;
    width:calc(var(--px)*2);height:calc(var(--px)*18);
    background:linear-gradient(90deg, #6b3e1f 0%, #a26a3a 50%, #6b3e1f 100%);
    border:2px solid var(--ink);
  }
  .ladle-scoop{
    position:absolute;left:-4px;top:calc(var(--px)*14);
    width:calc(var(--px)*6);height:calc(var(--px)*5);
    background:linear-gradient(180deg, #c8b080 0%, #8a6a3a 100%);
    border:2px solid var(--ink);
    border-radius: 20% 20% 50% 50%;
  }
  @keyframes stir{
    0%{transform: rotate(-18deg) translateX(-8px);}
    50%{transform: rotate(18deg) translateX(8px);}
    100%{transform: rotate(-18deg) translateX(-8px);}
  }

  /* ====== Steam ====== */
  .steam{
    position:absolute;left:50%;bottom:calc(var(--px)*58);
    width:8px;height:8px;
    transform:translateX(-50%);
    z-index:2;
  }
  .steam-puff{
    position:absolute;width:22px;height:22px;
    background: radial-gradient(circle, rgba(240,230,210,.85) 0%, rgba(240,230,210,.4) 50%, transparent 70%);
    border-radius:50%;
    animation: steamRise 3.2s ease-out infinite;
    opacity:0;
  }
  .steam-puff.s1{animation-delay:0s;left:-14px;}
  .steam-puff.s2{animation-delay:.6s;left:-2px;}
  .steam-puff.s3{animation-delay:1.2s;left:10px;}
  .steam-puff.s4{animation-delay:1.8s;left:-10px;}
  .steam-puff.s5{animation-delay:2.4s;left:2px;}
  @keyframes steamRise{
    0%{transform: translate(0,0) scale(.4); opacity:0;}
    15%{opacity:.8;}
    100%{transform: translate(var(--dx,15px), -120px) scale(1.8); opacity:0;}
  }

  /* Ground shadow under stove */
  .stove-shadow{
    position:absolute;left:calc(var(--px)*4);bottom:-6px;
    width:calc(var(--px)*64);height:8px;
    background:radial-gradient(ellipse, rgba(0,0,0,.5), transparent 70%);
  }
  /* Floor planks */
  .floor{
    position:absolute;left:0;right:0;bottom:0;height:32px;
    background:
      repeating-linear-gradient(90deg, #4a2818 0 3px, transparent 3px 60px),
      linear-gradient(180deg, #6b3e1f 0%, #3a2010 100%);
    border-top:3px solid var(--ink);
  }

  /* ================== Progress & controls ================= */
  .cook-hud{
    position:absolute;bottom:52px;left:14px;right:14px;
    display:flex;align-items:center;gap:12px;z-index:5;
  }
  /* ======= Target formula scroll (hovers beside the pot) ======= */
  .target-scroll{
    position:absolute;top:60px;right:22px;
    z-index:6;
    display:flex;align-items:stretch;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.5));
    pointer-events:none;
    transform: rotate(2deg);
  }
  .target-scroll .rod{
    width:10px;
    background:linear-gradient(180deg,#8a5a2a 0%,#5a3418 50%,#3a2010 100%);
    border:2px solid var(--ink);
    box-shadow: inset 0 2px 0 #c08a4a;
    position:relative;
  }
  .target-scroll .rod::before,.target-scroll .rod::after{
    content:"";position:absolute;left:-3px;width:16px;height:8px;
    background:linear-gradient(180deg,#c89550,#5a3418);
    border:2px solid var(--ink);
  }
  .target-scroll .rod::before{top:-4px;}
  .target-scroll .rod::after{bottom:-4px;}
  .target-scroll .parchment{
    padding:8px 12px;min-width:120px;max-width:160px;
    background:
      linear-gradient(180deg,#f4dba8 0%,#e8c991 100%);
    border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);
    text-align:center;
    position:relative;
    animation: scrollBob 3.8s ease-in-out infinite;
  }
  @keyframes scrollBob{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-4px) rotate(-.5deg);}
  }
  .target-scroll .tgt-label{
    font-family:"Noto Serif SC",serif;font-weight:600;
    font-size:9px;color:var(--wood-dark);letter-spacing:3px;
    border-bottom:1px dashed var(--wood-dark);padding-bottom:3px;margin-bottom:4px;
  }
  .target-scroll .tgt-name{
    font-family:"Noto Serif SC",serif;font-weight:900;
    font-size:16px;color:var(--ink);letter-spacing:4px;
    text-shadow: 1px 1px 0 rgba(184,50,44,.15);
  }
  .target-scroll .tgt-clue{
    font-family:"ZCOOL XiaoWei",serif;
    font-size:10px;color:var(--cinnabar-deep);letter-spacing:2px;margin-top:3px;
  }
  .target-scroll .tgt-progress{
    display:flex;gap:3px;justify-content:center;margin-top:5px;
  }
  .target-scroll .tgt-dot{
    width:7px;height:7px;background:rgba(90,46,24,.25);border:1px solid var(--wood-dark);
  }
  .target-scroll .tgt-dot.on{background:var(--cinnabar);box-shadow:0 0 3px rgba(255,120,30,.8);}
  .hud-label{
    font-family:"Noto Serif SC",serif;font-weight:900;
    color:var(--ink);font-size:13px;letter-spacing:3px;
    background:var(--paper-bright);padding:2px 8px;border:2px solid var(--ink);
  }
  .heat-bar{
    flex:1;height:18px;position:relative;
    background:#2a1408;border:2px solid var(--ink);
    box-shadow: inset 1px 1px 0 rgba(0,0,0,.6);
    image-rendering:pixelated;
  }
  .heat-fill{
    height:100%;
    background:
      repeating-linear-gradient(90deg,
        #ff7a1a 0 6px, #ffae2a 6px 12px, #ffd24a 12px 18px);
    transition: width .3s;
    position:relative;
  }
  .heat-fill::after{
    content:"";position:absolute;top:2px;left:0;right:0;height:3px;
    background:rgba(255,255,255,.4);
  }
  .heat-ticks{
    position:absolute;inset:0;display:flex;pointer-events:none;
  }
  .heat-ticks span{flex:1;border-right:2px solid rgba(0,0,0,.5);}
  .heat-ticks span:last-child{border-right:none;}
  .heat-zone{
    position:absolute;top:-6px;width:4px;height:30px;
    background:var(--cinnabar);
    box-shadow: 1px 1px 0 rgba(0,0,0,.5);
  }

  /* ============== Backpack (右侧药材) =============== */
  .bag-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;border-bottom:2px dashed var(--wood-dark);
  }
  .bag-title{
    font-family:"Noto Serif SC",serif;font-weight:900;
    color:var(--ink);font-size:18px;letter-spacing:6px;
  }
  .bag-count{
    font-family:"Noto Serif SC",serif;
    color:var(--wood-dark);font-size:11px;letter-spacing:1px;white-space:nowrap;
    background:var(--paper-bright);padding:2px 8px;border:2px solid var(--wood-dark);
  }
  .bag-grid{
    padding:12px;display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:8px;
    height: calc(100% - 62px);
    overflow-y:scroll;
    scrollbar-gutter: stable;
  }
  .bag-grid::-webkit-scrollbar{width:14px;}
  .bag-grid::-webkit-scrollbar-track{
    background:repeating-linear-gradient(180deg,#5a3418 0 2px,#3a2010 2px 4px);
    border-left:2px solid var(--ink);
  }
  .bag-grid::-webkit-scrollbar-thumb{
    background:linear-gradient(180deg,#c89550,#8a5a2a);
    border:2px solid var(--ink);
    box-shadow: inset 1px 1px 0 rgba(255,220,150,.5);
  }

  /* Wooden tag (木牌挂签) */
  .tag{
    position:relative;
    height:96px;
    cursor:grab;
    display:flex;flex-direction:column;align-items:center;
    padding-top:14px;
    image-rendering:pixelated;
    transition: transform .12s;
  }
  .tag:hover{transform: translateY(-2px) rotate(-1deg);}
  .tag:active{cursor:grabbing;}
  .tag.dragging{opacity:.4;}
  .tag-string{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:2px;height:10px;background:var(--ink);
  }
  .tag-string::before{
    content:"";position:absolute;top:-3px;left:-3px;
    width:8px;height:8px;border-radius:50%;
    background:var(--cinnabar);border:2px solid var(--ink);
  }
  .tag-plank{
    position:relative;
    width:84px;height:78px;
    background:
      repeating-linear-gradient(180deg,
        #c89550 0 3px,
        #a8753a 3px 5px,
        #c89550 5px 8px);
    border:3px solid var(--wood-dark);
    border-radius: 4px 4px 8px 8px;
    box-shadow:
      inset 2px 2px 0 rgba(255,210,150,.4),
      inset -2px -2px 0 rgba(0,0,0,.3),
      2px 2px 0 rgba(0,0,0,.3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:4px;
  }
  .tag-plank::before{
    content:"";position:absolute;top:-6px;left:6px;right:6px;height:3px;
    background:var(--wood-dark);
  }
  /* pixel herb icon (small) */
  .herb-icon{
    width:36px;height:28px;display:flex;align-items:center;justify-content:center;
    image-rendering:pixelated;
    font-size:0;
  }
  .herb-icon svg{image-rendering:pixelated;}
  .tag-name{
    font-family:"Noto Serif SC",serif;font-weight:900;
    color:var(--ink);font-size:12px;letter-spacing:2px;margin-top:2px;
    text-shadow: 1px 1px 0 rgba(255,230,180,.6);
  }
  .tag-prop{
    font-family:"ZCOOL XiaoWei",serif;
    color:var(--cinnabar-deep);font-size:9px;letter-spacing:1px;
    margin-top:1px;
  }
  .tag-count{
    position:absolute;bottom:-6px;right:-6px;
    min-width:20px;height:20px;padding:0 4px;
    background:var(--ink);color:var(--paper-bright);
    font-family:"VT323",monospace;font-size:14px;font-weight:bold;
    display:grid;place-content:center;
    border:2px solid var(--paper-bright);
    box-shadow: 1px 1px 0 rgba(0,0,0,.5);
  }

  /* ============== Vials (下方 玉瓶陈列) =============== */
  .vials-area{
    padding:22px 16px 14px;height:100%;display:flex;flex-direction:column;
  }
  .vials-header{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin-bottom:8px;padding-right:90px; /* room for brew button */
  }
  .vials-title{
    font-family:"Noto Serif SC",serif;font-weight:900;
    color:var(--ink);font-size:16px;letter-spacing:5px;
  }
  .vials-hint{
    font-family:"ZCOOL XiaoWei",serif;
    color:var(--wood-dark);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .vials-shelf{
    flex:1;position:relative;display:flex;align-items:flex-end;justify-content:space-around;
    padding:0 12px 8px;
    background:
      linear-gradient(180deg, transparent 0%, transparent 82%, #6b3e1f 82%, #6b3e1f 100%);
  }
  .vials-shelf::before{
    content:"";position:absolute;left:8px;right:8px;bottom:22px;height:3px;background:var(--wood-dark);
  }
  .vials-shelf::after{
    content:"";position:absolute;left:8px;right:8px;bottom:0;height:3px;background:var(--wood-dark);
  }
  .vial{
    position:relative;width:44px;height:82px;z-index:2;
    image-rendering:pixelated;
    transition: transform .2s;
  }
  .vial:hover{transform: translateY(-4px);}
  .vial-cap{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:18px;height:10px;
    background:linear-gradient(180deg, #c08a4a 0%, #6b3e1f 100%);
    border:2px solid var(--ink);
  }
  .vial-neck{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    width:12px;height:8px;
    background: linear-gradient(180deg, rgba(180,220,200,.9) 0%, rgba(120,180,160,.9) 100%);
    border-left:2px solid var(--ink);border-right:2px solid var(--ink);
  }
  .vial-body{
    position:absolute;top:18px;left:2px;right:2px;bottom:0;
    background:
      linear-gradient(180deg, rgba(230,245,235,.9) 0%, rgba(140,195,170,.85) 30%, rgba(90,155,125,.9) 70%, rgba(50,110,90,.95) 100%);
    border:2px solid var(--ink);
    border-radius: 6px 6px 14px 14px;
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,.4),
      inset -3px -3px 0 rgba(0,0,0,.3);
    overflow:hidden;
  }
  .vial-body::before{
    content:"";position:absolute;top:4px;left:4px;width:3px;height:20px;
    background:rgba(255,255,255,.7);
  }
  /* liquid level */
  .vial-liquid{
    position:absolute;left:2px;right:2px;bottom:2px;
    border-radius: 0 0 12px 12px;
  }
  .vial-label{
    position:absolute;top:30px;
    left:50%;transform:translateX(-50%);
    background:var(--paper-bright);color:var(--ink);
    font-family:"Noto Serif SC",serif;font-weight:900;
    font-size:10px;letter-spacing:0;text-align:center;
    padding:4px 2px;border:1px solid var(--wood-dark);
    writing-mode: vertical-rl;
    width:14px;min-height:36px;white-space:nowrap;
    box-shadow: 1px 1px 0 rgba(0,0,0,.4);
  }
  .vial-empty .vial-liquid,.vial-empty .vial-label,.vial-empty .vial-neck{display:none;}
  .vial-empty .vial-body{
    background: repeating-linear-gradient(45deg,
      rgba(90,46,24,.15) 0 4px, transparent 4px 8px);
  }
  .vial-empty .vial-cap{background:repeating-linear-gradient(90deg,#8a5028 0 2px, #6b3e1f 2px 4px);}

  /* glow when finished */
  .vial.gold-glow{
    animation: goldPulse 1.6s ease-in-out infinite;
  }
  @keyframes goldPulse{
    0%,100%{filter: drop-shadow(0 0 4px #ffd24a);}
    50%{filter: drop-shadow(0 0 14px #fff1a8) drop-shadow(0 0 4px #ffae2a);}
  }

  /* ===================== Drag feedback ===================== */
  .drag-ghost{
    position:fixed;pointer-events:none;z-index:999;
    transform: translate(-50%,-50%) rotate(-6deg);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,.6));
  }
  .drag-trail{
    position:fixed;pointer-events:none;z-index:998;
    width:6px;height:6px;background:var(--ember-core);
    border-radius:50%;
    box-shadow: 0 0 6px #ffd24a;
    animation: trailFade .6s ease-out forwards;
  }
  @keyframes trailFade{
    0%{opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(.2);}
  }

  /* splash when herb enters pot */
  .splash{
    position:absolute;pointer-events:none;
    width:8px;height:8px;background:#c89550;border-radius:50%;
    animation: splash 0.8s ease-out forwards;
    z-index:10;
  }
  @keyframes splash{
    0%{transform: translate(0,0) scale(1);opacity:1;}
    100%{transform: translate(var(--sx,20px), var(--sy,-30px)) scale(.2);opacity:0;}
  }

  /* gold shimmer on complete */
  .gold-burst{
    position:absolute;inset:0;pointer-events:none;
    background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,241,168,.8) 0%, rgba(255,210,74,.3) 20%, transparent 45%);
    animation: goldBurst 1.4s ease-out forwards;
  }
  @keyframes goldBurst{
    0%{opacity:0;transform:scale(.2);}
    20%{opacity:1;}
    100%{opacity:0;transform:scale(2.5);}
  }

  /* pot drop zone highlight */
  .pot-wrap.droppable::after{
    content:"";position:absolute;inset:-8px;border:3px dashed #ffd24a;
    border-radius:40%;
    animation: dropPulse .8s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes dropPulse{
    0%,100%{transform:scale(1);opacity:.7;}
    50%{transform:scale(1.08);opacity:1;}
  }

  /* ===================== Formula slot (chosen herbs) ===================== */
  .formula-slots{
    position:absolute;bottom:12px;left:12px;right:12px;
    display:flex;gap:6px;justify-content:center;z-index:5;
  }
  .slot{
    width:36px;height:36px;
    background:rgba(58,36,24,.35);
    border:2px dashed var(--wood-dark);
    display:grid;place-content:center;
    font-family:"Noto Serif SC",serif;font-size:11px;color:var(--wood-dark);letter-spacing:1px;
  }
  .slot.filled{
    background:var(--paper-bright);border-style:solid;
    color:var(--ink);font-weight:900;font-size:13px;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,.5), 1px 1px 0 rgba(0,0,0,.3);
  }

  /* Action button */
  .brew-btn{
    position:absolute;right:12px;top:10px;z-index:6;
    padding:6px 14px;
    background:var(--cinnabar);color:var(--paper-bright);
    border:3px solid var(--ink);
    font-family:"Noto Serif SC",serif;font-weight:900;font-size:13px;letter-spacing:3px;
    cursor:pointer;
    box-shadow: 2px 2px 0 rgba(0,0,0,.5), inset 1px 1px 0 rgba(255,255,255,.3);
  }
  .brew-btn:hover{background:var(--ember);}
  .brew-btn:active{transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(0,0,0,.5);}
  .brew-btn:disabled{background:#8a6a3a;cursor:not-allowed;opacity:.7;}

  /* Tweak panel */
  .tweaks{
    position:fixed;right:16px;bottom:16px;z-index:1000;
    background:var(--paper);border:3px solid var(--ink);
    padding:12px 14px;font-family:"Noto Serif SC",serif;color:var(--ink);
    box-shadow: 3px 3px 0 rgba(0,0,0,.5);
    display:none;min-width:200px;
  }
  .tweaks.active{display:block;}
  .tweaks h4{margin:0 0 8px;font-size:13px;letter-spacing:3px;border-bottom:2px solid var(--ink);padding-bottom:4px;}
  .tweaks label{display:block;font-size:12px;margin:6px 0 2px;letter-spacing:2px;}
  .tweaks select,.tweaks input[type=range]{width:100%;}

  /* Frame variants */
  .variant-bamboo .paper{
    box-shadow:
      inset 0 0 0 3px #4a5a2a,
      inset 0 0 0 6px #e8c991,
      inset 0 0 0 8px #4a5a2a,
      inset 0 20px 60px rgba(74,90,42,.2);
  }
  .variant-bamboo .roller{
    background: linear-gradient(180deg, #6a8a3a 0%, #4a5a2a 50%, #2a3a15 100%);
    border-top-color: #8aaa5a;border-bottom-color:#1a2a0a;
  }
  .variant-bamboo .roller-cap{
    background: linear-gradient(180deg, #8aaa5a 0%, #4a5a2a 50%, #2a3a15 100%);
  }

  .variant-gold .paper{
    background:
      radial-gradient(ellipse at 30% 20%, #fff3d0 0%, transparent 55%),
      linear-gradient(180deg, #f4dba8 0%, #e8c991 100%);
    box-shadow:
      inset 0 0 0 3px #c89550,
      inset 0 0 0 6px #f4dba8,
      inset 0 0 0 8px #8a5a2a,
      inset 0 0 0 10px #c89550,
      inset 0 0 60px rgba(200,149,80,.4);
  }
  .variant-gold .seal{background:#1a0a04;border-color:#c89550;color:#ffd24a;}

  /* =================== Drop burst effects =================== */
  .drop-burst{
    position:absolute;width:0;height:0;pointer-events:none;z-index:20;
    transform:translate(-50%,-50%);
  }
  .burst-ring{
    position:absolute;left:50%;top:50%;
    width:20px;height:20px;
    transform:translate(-50%,-50%);
    border:3px solid;border-radius:50%;
    animation: burstRing .7s ease-out forwards;
  }
  .burst-ring-2{animation-delay:.15s;animation-duration:.9s;}
  .burst-ok .burst-ring{border-color:#ffd24a;box-shadow:0 0 20px #ffae2a, inset 0 0 12px #fff3c0;}
  .burst-bad .burst-ring{border-color:#ff4a3a;box-shadow:0 0 20px #b8322c, inset 0 0 12px #ff7066;}
  @keyframes burstRing{
    0%{width:10px;height:10px;opacity:.9;border-width:4px;}
    100%{width:140px;height:140px;opacity:0;border-width:1px;}
  }

  .burst-ray{
    position:absolute;left:50%;top:50%;
    width:3px;height:38px;
    background:linear-gradient(180deg,#fff3c0 0%,#ffd24a 40%,transparent 100%);
    transform-origin:50% 100%;
    box-shadow:0 0 8px #ffae2a;
    animation: rayPulse .8s ease-out forwards;
  }
  @keyframes rayPulse{
    0%{height:0;opacity:0;}
    25%{height:44px;opacity:1;}
    100%{height:80px;opacity:0;}
  }

  .burst-stamp{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:44px;height:44px;
    display:grid;place-items:center;
    background:var(--cinnabar-deep);color:#ffd24a;
    border:3px solid #ffae2a;
    font-family:"Noto Serif SC",serif;font-weight:900;font-size:22px;
    box-shadow: 0 0 20px rgba(255,210,74,.9), 2px 2px 0 rgba(0,0,0,.4);
    animation: stampIn .8s cubic-bezier(.3,1.8,.5,1) forwards;
    image-rendering:pixelated;
  }
  @keyframes stampIn{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-20deg); opacity:0;}
    40%{transform:translate(-50%,-50%) scale(1.3) rotate(-8deg); opacity:1;}
    70%{transform:translate(-50%,-50%) scale(1) rotate(-4deg); opacity:1;}
    100%{transform:translate(-50%,-60%) scale(1) rotate(-4deg); opacity:0;}
  }

  .burst-cross{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:56px;height:56px;
    animation: crossShake .5s ease-in-out forwards;
  }
  .burst-cross span{
    position:absolute;left:50%;top:50%;
    width:56px;height:8px;
    background:linear-gradient(90deg,transparent 0%,#ff4a3a 15%,#b8322c 50%,#ff4a3a 85%,transparent 100%);
    transform-origin:50% 50%;
    box-shadow: 0 0 12px #ff4a3a, 0 0 20px #b8322c;
  }
  .burst-cross span:first-child{transform:translate(-50%,-50%) rotate(45deg);}
  .burst-cross span:last-child{transform:translate(-50%,-50%) rotate(-45deg);}
  @keyframes crossShake{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.3);}
    25%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
    35%{transform:translate(-46%,-50%) scale(1);}
    45%{transform:translate(-54%,-50%) scale(1);}
    55%{transform:translate(-46%,-50%) scale(1);}
    65%{transform:translate(-54%,-50%) scale(1);}
    75%{transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(.9);}
  }

  .burst-smoke{
    position:absolute;left:50%;top:50%;
    width:60px;height:60px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(40,20,10,.7) 0%,rgba(80,40,20,.4) 40%,transparent 70%);
    border-radius:50%;
    animation: smokeRise 1.1s ease-out forwards;
  }
  @keyframes smokeRise{
    0%{width:20px;height:20px;opacity:0;}
    20%{opacity:.9;}
    100%{width:120px;height:120px;opacity:0;transform:translate(-50%,-120%);}
  }

  .burst-spark{
    position:absolute;left:50%;top:50%;
    width:5px;height:5px;border-radius:50%;
    animation: sparkFly 1s ease-out forwards;
  }
  .burst-ok .burst-spark{
    background:#ffd24a;
    box-shadow: 0 0 8px #ffae2a, 0 0 14px #fff3c0;
  }
  .burst-bad .burst-spark{
    background:#ff4a3a;
    box-shadow: 0 0 8px #b8322c;
  }
  @keyframes sparkFly{
    0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
    100%{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.2);opacity:0;}
  }

  /* ==== Pot shake feedback ==== */
  .stove-area.shake-ok .pot-wrap{animation: potCheer .5s ease-out;}
  .stove-area.shake-bad .pot-wrap{animation: potAngry .6s ease-in-out;}
  @keyframes potCheer{
    0%{transform:translateY(0);}
    30%{transform:translateY(-6px) scale(1.04);}
    55%{transform:translateY(0) scale(1);}
    75%{transform:translateY(-2px);}
    100%{transform:translateY(0);}
  }
  @keyframes potAngry{
    0%,100%{transform:translateX(0);}
    15%{transform:translateX(-5px) rotate(-2deg);}
    30%{transform:translateX(5px) rotate(2deg);}
    45%{transform:translateX(-4px) rotate(-1deg);}
    60%{transform:translateX(4px) rotate(1deg);}
    75%{transform:translateX(-2px);}
  }
  .stove-area.shake-bad{
    background: radial-gradient(ellipse at 50% 70%, rgba(184,50,44,.25) 0%, transparent 60%);
  }
  .stove-area.shake-ok{
    background: radial-gradient(ellipse at 50% 70%, rgba(255,210,74,.25) 0%, transparent 60%);
  }

  /* ==== Splash droplets ==== */
  .splash{
    position:absolute;width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle,#c89550 0%,#6a3a18 100%);
    pointer-events:none;
    animation: splashFly .9s ease-out forwards;
    box-shadow: 0 0 4px rgba(200,149,80,.6);
  }
  @keyframes splashFly{
    0%{transform:translate(0,0) scale(1.2);opacity:1;}
    100%{transform:translate(var(--sx), var(--sy)) scale(.2);opacity:0;}
  }

  /* ==== Drag ghost + trail ==== */
  .drag-ghost{
    position:fixed;pointer-events:none;z-index:9999;
    transform:translate(-50%,-50%);
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.5));
  }
  .drag-trail{
    position:fixed;pointer-events:none;z-index:9998;
    width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle,#ffd24a 0%,#ffae2a 60%,transparent 100%);
    transform:translate(-50%,-50%);
    animation: trailFade .6s ease-out forwards;
  }
  @keyframes trailFade{
    0%{opacity:.9;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(.2);}
  }

  /* ==== Gold burst on brew completion ==== */
  .gold-burst{
    position:absolute;left:var(--x);top:var(--y);width:0;height:0;
    pointer-events:none;z-index:15;
  }
  .gold-burst::before{
    content:"";position:absolute;left:50%;top:50%;
    width:40px;height:40px;transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle,#fff3c0 0%,#ffd24a 40%,#ff7a1a 70%,transparent 90%);
    animation: goldPulse 2.5s ease-out forwards;
    box-shadow: 0 0 40px #ffd24a, 0 0 80px #ffae2a;
  }
  @keyframes goldPulse{
    0%{width:20px;height:20px;opacity:0;}
    20%{opacity:1;width:80px;height:80px;}
    100%{opacity:0;width:280px;height:280px;}
  }

  /* ==== Formula slots under pot (two rows, full names) ==== */
  .formula-slots{
    position:absolute;bottom:8px;left:14px;right:14px;
    z-index:5;
    display:flex;flex-wrap:wrap;justify-content:center;gap:6px 6px;
    padding:6px 4px;
    background: linear-gradient(180deg, rgba(42,20,10,.75), rgba(26,10,4,.9));
    border:2px solid var(--wood-dark);
    box-shadow: inset 1px 1px 0 rgba(200,149,80,.3);
  }
  .formula-slots.two-rows{max-width:100%;}
  .formula-slots .slot{
    min-width:46px;height:32px;padding:2px 6px;
    display:flex;align-items:center;justify-content:center;
    background:
      repeating-linear-gradient(45deg, rgba(90,46,24,.3) 0 3px, transparent 3px 6px),
      linear-gradient(180deg, rgba(60,30,12,.8), rgba(26,10,4,.9));
    border:2px dashed rgba(200,149,80,.45);
    color:rgba(200,149,80,.55);
    font-family:"Noto Serif SC",serif;font-weight:900;font-size:13px;
    letter-spacing:2px;
    transition: all .25s ease;
  }
  .formula-slots .slot.filled{
    background: linear-gradient(180deg, #f4dba8 0%, #c89550 100%);
    border:2px solid var(--ink);
    color:var(--ink);
    box-shadow:
      inset 1px 1px 0 rgba(255,240,200,.7),
      0 0 8px rgba(255,210,74,.4),
      2px 2px 0 rgba(0,0,0,.4);
    animation: slotFill .5s cubic-bezier(.3,1.7,.5,1);
  }
  @keyframes slotFill{
    0%{transform:scale(.3);opacity:0;}
    60%{transform:scale(1.15);}
    100%{transform:scale(1);opacity:1;}
  }
  .slot-plus{opacity:.5;font-size:16px;}
  .slot-name{white-space:nowrap;font-size:13px;}

  /* ==== Herb tags (bag grid items) ==== */
  .tag{
    position:relative;display:flex;flex-direction:column;align-items:center;
    cursor:grab;user-select:none;
    transition: transform .15s;
  }
  .tag:hover{transform:translateY(-2px);}
  .tag:active{cursor:grabbing;}
  .tag.dragging{opacity:.3;}
  .tag-string{
    width:2px;height:10px;background:#3a2010;
  }
  .tag-plank{
    width:62px;padding:6px 4px 4px;
    background: linear-gradient(180deg, #c89550 0%, #a26a3a 100%);
    border:2px solid var(--wood-dark);
    box-shadow:
      inset 1px 1px 0 rgba(255,220,150,.5),
      inset -1px -1px 0 rgba(0,0,0,.35),
      2px 2px 0 rgba(0,0,0,.4);
    text-align:center;
  }
  .tag-plank::before{
    content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);
    width:3px;height:3px;background:#3a2010;border-radius:50%;
  }
  .herb-icon{display:flex;justify-content:center;margin-top:4px;image-rendering:pixelated;}
  .tag-name{
    font-family:"Noto Serif SC",serif;font-weight:900;
    color:var(--ink);font-size:11px;letter-spacing:1px;margin-top:2px;
  }
  .tag-prop{
    font-family:"ZCOOL XiaoWei",serif;
    color:var(--wood-dark);font-size:8px;letter-spacing:1px;
    border-top:1px dashed var(--wood-dark);margin-top:2px;padding-top:1px;
  }
  .tag-count{
    position:absolute;top:-2px;right:-2px;
    background:var(--cinnabar-deep);color:#f4dba8;
    font-family:"Noto Serif SC",serif;font-weight:900;font-size:9px;
    padding:1px 4px;border:1px solid var(--ink);
    box-shadow: 1px 1px 0 rgba(0,0,0,.4);
  }

  /* ==== Vials shelf ==== */
  .vials-area{
    position:absolute;inset:0;padding:18px 16px 10px 14px;
    display:flex;flex-direction:column;
  }
  .vials-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
  .vials-title{
    font-family:"Noto Serif SC",serif;font-weight:900;
    color:var(--ink);font-size:15px;letter-spacing:5px;
  }
  .vials-hint{
    font-family:"ZCOOL XiaoWei",serif;
    color:var(--wood-dark);font-size:10px;letter-spacing:2px;
  }
  .vials-shelf{
    flex:1;display:flex;align-items:flex-end;justify-content:space-around;gap:8px;
    padding:6px 8px 4px;
    background:
      linear-gradient(180deg, transparent 0%, transparent 75%, #6b3e1f 75%, #3a2010 100%);
    border-bottom:3px solid var(--ink);
    position:relative;
  }
  .vial{
    position:relative;width:38px;height:62px;
    display:flex;flex-direction:column;align-items:center;
  }
  .vial-cap{width:16px;height:6px;background:#6b3e1f;border:1px solid var(--ink);}
  .vial-neck{width:10px;height:4px;background:rgba(200,149,80,.4);border-left:1px solid var(--ink);border-right:1px solid var(--ink);}
  .vial-body{
    width:28px;flex:1;position:relative;
    background: linear-gradient(90deg, rgba(200,220,200,.5) 0%, rgba(230,240,220,.25) 40%, rgba(200,220,200,.5) 100%);
    border:2px solid var(--ink);
    border-radius: 4px 4px 8px 8px;
    box-shadow: inset 2px 0 0 rgba(255,255,255,.3), inset -2px 0 0 rgba(0,0,0,.2);
    overflow:hidden;
  }
  .vial-liquid{position:absolute;left:0;right:0;bottom:0;}
  .vial-empty .vial-body{opacity:.35;}
  .vial-label{
    position:absolute;top:30px;
    left:50%;transform:translateX(-50%);
    background:var(--paper-bright);color:var(--ink);
    font-family:"Noto Serif SC",serif;font-weight:900;
    font-size:10px;letter-spacing:0;text-align:center;
    padding:4px 2px;border:1px solid var(--wood-dark);
    writing-mode: vertical-rl;
    width:14px;min-height:36px;white-space:nowrap;
    box-shadow: 1px 1px 0 rgba(0,0,0,.4);
  }
  .gold-glow .vial-body{box-shadow: 0 0 12px rgba(255,210,74,.8), inset 2px 0 0 rgba(255,255,255,.5), inset -2px 0 0 rgba(0,0,0,.2);}

</style>
</head>
<body>

<div class="backdrop">
  <div class="clinic-hint"></div>
</div>

<div class="stage">
  <div id="root"></div>
</div>

<div class="tweaks" id="tweaks">
  <h4>煎药弹窗 · 调参</h4>
  <label>外框样式</label>
  <select id="tw-frame">
    <option value="default">卷轴朱印（默认）</option>
    <option value="bamboo">翠竹青卷</option>
    <option value="gold">宣纸烫金</option>
  </select>
  <label>火候 <span id="heat-val">68</span>%</label>
  <input type="range" id="tw-heat" min="0" max="100" value="68">
  <label>演示状态</label>
  <select id="tw-state">
    <option value="brewing">煎煮中</option>
    <option value="idle">待开始</option>
    <option value="done">煎成</option>
  </select>
</div>

<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "frame": "default",
  "heat": 68,
  "state": "brewing"
}/*EDITMODE-END*/
</script>

<script type="text/babel" src="herb-icons.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
