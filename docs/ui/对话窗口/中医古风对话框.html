<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>中医古风对话框 · 三种变体</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #f0eee9; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="rich-text.jsx"></script>
  <script type="text/babel" src="dialog-scroll.jsx"></script>
  <script type="text/babel" src="dialog-ledger.jsx"></script>
  <script type="text/babel" src="dialog-ledger-v2.jsx"></script>
  <script type="text/babel" src="dialog-modern.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="dialogs"
            title="中医古风对话框"
            subtitle="竖版 · 富文本教学 · 玩家可输入与选择 · hover 下划线词条查看注解"
          >
            <DCArtboard id="ledger-v2" label="★ 杏林讲席（B + A 卷轴 + C 选项动效）" width={440} height={780}>
              <LedgerV2Dialog />
            </DCArtboard>
            <DCArtboard id="scroll" label="A · 经典卷轴" width={460} height={760}>
              <ScrollDialog />
            </DCArtboard>
            <DCArtboard id="ledger" label="B · 医案册（原版）" width={440} height={760}>
              <LedgerDialog />
            </DCArtboard>
            <DCArtboard id="modern" label="C · 仙侠 RPG 混合" width={440} height={760}>
              <ModernDialog />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
